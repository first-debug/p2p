services:
  p2p-1:
    image: p2p:latest
    container_name: p2p-1
    environment:
      TZ: Europe/Moscow
    networks:
        - p2p
    command: sleep inf
    volumes:
      - ./data/p2p-1/:/home/appuser/
  p2p-2:
    image: p2p:latest
    container_name: p2p-2
    environment:
      TZ: Europe/Moscow
    networks:
        - p2p
    command: sleep inf
    volumes:
      - ./data/p2p-2/:/home/appuser/

networks:
  p2p:
    name: p2p
