syntax = "proto3";

option go_package = "./pb";

import "google/protobuf/timestamp.proto";

message Message {
  google.protobuf.Timestamp send_time = 1;
  string message = 2;
}

message Peer {
	UUID ID = 1;
	int32 port = 2;
	map<string, string> files = 3;
    string IP = 4;
    bool is_public_ip = 5;
}

message KnownPeers {
  repeated Peer peers = 1;
}

message UUID {
  bytes value = 1;
}
