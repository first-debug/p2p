services:
  p2p-1:
    image: p2p:latest
    container_name: p2p-1
    environment:
      TZ: Europe/Moscow
    env_file:
      - .env.docker
    networks:
        - p2p
    command: sleep inf
    volumes:
      - ./data/p2p-1/:/data/p2p/
  p2p-2:
    image: p2p:latest
    container_name: p2p-2
    environment:
      TZ: Europe/Moscow
    env_file:
      - .env.docker
    networks:
        - p2p
    command: sleep inf
    volumes:
      - ./data/p2p-2/:/data/p2p/

networks:
  p2p:
    name: p2p
